services:
  postgres:
    image: postgres:17-alpine
    container_name: homequest-postgres
    environment:
      POSTGRES_DB: homequest
      POSTGRES_USER: homequest
      POSTGRES_PASSWORD: homequest123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homequest -d homequest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homequest-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/homequest
      SPRING_DATASOURCE_USERNAME: homequest
      SPRING_DATASOURCE_PASSWORD: homequest123
      JWT_SECRET: change-me-to-a-long-64-char-secret-key-change-me-123456
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: homequest-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
